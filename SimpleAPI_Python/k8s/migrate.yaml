apiVersion: batch/v1
kind: Job
metadata:
  name: schema-migration
spec:
  template:
    spec:
      containers:
      - name: mysql-client
        image: mysql:8.0
        command: ["/bin/sh", "-c"]
        # This command waits for mysql to be ready, then injects the schema
        args:
          - |
            until mysqladmin ping -h mysql-service --silent; do
              echo "Waiting for database..."
              sleep 2
            done
            mysql -h mysql-service -u root -p"$DB_PASSWORD" simple_pins_api < /migrations/schema.sql
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: DB_PASSWORD
        volumeMounts:
        - name: schema-volume
          mountPath: /migrations
      restartPolicy: OnFailure
      volumes:
      - name: schema-volume
        configMap:
          name: schema-config
